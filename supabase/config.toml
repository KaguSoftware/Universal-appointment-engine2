# Supabase project configuration.
# Link to a hosted project with:  supabase link --project-ref <ref>
# Apply migrations with:          supabase db push
# Or run locally (needs Docker):  supabase start && supabase db reset

project_id = "universal-appointment-engine"

[db]
port = 54322
major_version = 15

[auth]
enable_signup = true
# Set your deployed URL here in production.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]

[auth.email]
enable_confirmations = false

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
